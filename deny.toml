[advisories]
ignore = [
    "RUSTSEC-2026-0049",
    "RUSTSEC-2025-0134",
    # rustls-webpki 0.102.8 pulled transitively by rumqttc 0.25.1 (latest).
    # Both advisories concern name-constraint validation and are only
    # reachable over TLS; our MQTT client uses plaintext, so the vulnerable
    # code path is never exercised. Remove once rumqttc upgrades to
    # rustls 0.23+ / rustls-webpki 0.103.12+.
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    # rustls-webpki 0.102.8 via rumqttc 0.25.1 (no newer compatible version available).
    # CRL parsing panic is only reachable over TLS; our MQTT client uses plaintext.
    # Remove once rumqttc updates to rustls-webpki 0.103.13+.
    "RUSTSEC-2026-0104",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
