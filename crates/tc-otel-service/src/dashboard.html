<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tc-otel Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;line-height:1.5}
.header{background:#1e293b;padding:1rem 2rem;border-bottom:1px solid #334155;display:flex;align-items:center;gap:1rem}
.header h1{font-size:1.25rem;font-weight:600;color:#38bdf8}
.header .status-dot{width:10px;height:10px;border-radius:50%;background:#22c55e;display:inline-block}
.container{max-width:1200px;margin:0 auto;padding:1.5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;margin-bottom:1.5rem}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:1.25rem}
.card h2{font-size:0.875rem;text-transform:uppercase;letter-spacing:0.05em;color:#94a3b8;margin-bottom:0.75rem}
.stat{font-size:2rem;font-weight:700;color:#f1f5f9}
.stat-label{font-size:0.75rem;color:#64748b;margin-top:0.25rem}
.stat-row{display:flex;justify-content:space-between;padding:0.375rem 0;border-bottom:1px solid #334155}
.stat-row:last-child{border-bottom:none}
.stat-row .label{color:#94a3b8}
.stat-row .value{color:#f1f5f9;font-family:monospace}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:0.5rem;color:#94a3b8;font-size:0.75rem;text-transform:uppercase;border-bottom:1px solid #334155}
td{padding:0.5rem;font-size:0.875rem;border-bottom:1px solid #1e293b;font-family:monospace}
.section{margin-bottom:1.5rem}
.section h2{font-size:1rem;color:#94a3b8;margin-bottom:0.75rem;text-transform:uppercase;letter-spacing:0.05em}
.sub-form{display:flex;gap:0.5rem;margin-bottom:0.75rem}
.sub-form input{flex:1;padding:0.5rem;background:#0f172a;border:1px solid #334155;border-radius:4px;color:#e2e8f0;font-family:monospace}
.sub-form input:focus{outline:none;border-color:#38bdf8}
.btn{padding:0.5rem 1rem;border:none;border-radius:4px;cursor:pointer;font-size:0.875rem;font-weight:500}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-danger{background:#dc2626;color:#fff;padding:0.25rem 0.5rem;font-size:0.75rem}
.btn-danger:hover{background:#b91c1c}
.tag-list{display:flex;flex-wrap:wrap;gap:0.5rem}
.tag{background:#334155;padding:0.25rem 0.75rem;border-radius:16px;font-size:0.813rem;font-family:monospace;display:flex;align-items:center;gap:0.5rem}
.counter{font-size:0.75rem;color:#64748b;margin-bottom:0.5rem}
.empty{color:#475569;font-style:italic;padding:0.5rem 0}
</style>
</head>
<body>
<div class="header">
  <span class="status-dot" id="health-dot"></span>
  <h1>tc-otel Dashboard</h1>
  <span id="service-name" style="color:#64748b;font-size:0.875rem"></span>
</div>

<div class="container">
  <!-- Stats cards -->
  <div class="grid" id="stats-grid">
    <div class="card">
      <h2>Logs Received</h2>
      <div class="stat" id="logs-received">-</div>
    </div>
    <div class="card">
      <h2>Logs Exported</h2>
      <div class="stat" id="logs-exported">-</div>
    </div>
    <div class="card">
      <h2>Export Errors</h2>
      <div class="stat" id="export-errors">-</div>
    </div>
    <div class="card">
      <h2>Uptime</h2>
      <div class="stat" id="uptime">-</div>
    </div>
  </div>

  <!-- Config & Connections -->
  <div class="grid">
    <div class="card">
      <h2>Configuration</h2>
      <div id="config-info">
        <div class="stat-row"><span class="label">AMS Net ID</span><span class="value" id="cfg-ams-net-id">-</span></div>
        <div class="stat-row"><span class="label">AMS TCP Port</span><span class="value" id="cfg-ams-port">-</span></div>
        <div class="stat-row"><span class="label">Export Endpoint</span><span class="value" id="cfg-export">-</span></div>
        <div class="stat-row"><span class="label">Batch Size</span><span class="value" id="cfg-batch">-</span></div>
        <div class="stat-row"><span class="label">Max Connections</span><span class="value" id="cfg-max-conn">-</span></div>
      </div>
    </div>
    <div class="card">
      <h2>Active Connections</h2>
      <div class="stat" id="conn-total">0</div>
      <div class="stat-label">connected PLCs</div>
      <div id="conn-list" style="margin-top:0.75rem"></div>
    </div>
  </div>

  <!-- Registered Tasks -->
  <div class="section">
    <div class="card">
      <h2>Registered PLC Tasks</h2>
      <div id="tasks-container">
        <p class="empty">No tasks registered</p>
      </div>
    </div>
  </div>

  <!-- Subscriptions -->
  <div class="section">
    <div class="card">
      <h2>Tag Subscriptions</h2>
      <div class="counter" id="sub-counter">0 / 500</div>
      <div class="sub-form">
        <input type="text" id="sub-input" placeholder="Enter tag path (e.g. GVL.sensor_temp)">
        <button class="btn btn-primary" onclick="addSubscription()">Subscribe</button>
      </div>
      <div class="tag-list" id="sub-tags"></div>
    </div>
  </div>
</div>

<script>
const API = '';

async function fetchJSON(url) {
  const r = await fetch(API + url);
  return r.json();
}

function fmtUptime(secs) {
  const d = Math.floor(secs / 86400);
  const h = Math.floor((secs % 86400) / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  if (d > 0) return d + 'd ' + h + 'h ' + m + 'm';
  if (h > 0) return h + 'h ' + m + 'm ' + s + 's';
  if (m > 0) return m + 'm ' + s + 's';
  return s + 's';
}

async function refreshStatus() {
  try {
    const data = await fetchJSON('/api/status');
    document.getElementById('logs-received').textContent = data.logs_received.toLocaleString();
    document.getElementById('logs-exported').textContent = data.logs_exported.toLocaleString();
    document.getElementById('export-errors').textContent = data.export_errors.toLocaleString();
    document.getElementById('uptime').textContent = fmtUptime(data.uptime_secs);
    document.getElementById('service-name').textContent = data.service_name;
    document.getElementById('health-dot').style.background = '#22c55e';
  } catch (e) {
    document.getElementById('health-dot').style.background = '#dc2626';
  }
}

async function refreshConfig() {
  try {
    const data = await fetchJSON('/api/config');
    document.getElementById('cfg-ams-net-id').textContent = data.ams_net_id;
    document.getElementById('cfg-ams-port').textContent = data.ams_tcp_port;
    document.getElementById('cfg-export').textContent = data.export_endpoint;
    document.getElementById('cfg-batch').textContent = data.batch_size;
    document.getElementById('cfg-max-conn').textContent = data.max_connections;
  } catch (e) { /* ignore */ }
}

async function refreshConnections() {
  try {
    const data = await fetchJSON('/api/connections');
    document.getElementById('conn-total').textContent = data.total;
    const el = document.getElementById('conn-list');
    if (data.connections.length === 0) {
      el.innerHTML = '<p class="empty">No active connections</p>';
    } else {
      el.innerHTML = data.connections.map(c =>
        '<div class="stat-row"><span class="label">' + c.ip + '</span><span class="value">' + c.count + '</span></div>'
      ).join('');
    }
  } catch (e) { /* ignore */ }
}

async function refreshTasks() {
  try {
    const data = await fetchJSON('/api/tasks');
    const el = document.getElementById('tasks-container');
    if (data.length === 0) {
      el.innerHTML = '<p class="empty">No tasks registered</p>';
    } else {
      el.innerHTML = '<table><thead><tr><th>Task</th><th>App</th><th>Project</th><th>AMS Net ID</th><th>Port</th></tr></thead><tbody>' +
        data.map(t => '<tr><td>' + t.task_name + '</td><td>' + t.app_name + '</td><td>' + t.project_name +
          '</td><td>' + t.ams_net_id + '</td><td>' + t.ams_source_port + '</td></tr>').join('') +
        '</tbody></table>';
    }
  } catch (e) { /* ignore */ }
}

async function refreshSubscriptions() {
  try {
    const data = await fetchJSON('/api/subscriptions');
    document.getElementById('sub-counter').textContent = data.count + ' / ' + data.max;
    const el = document.getElementById('sub-tags');
    if (data.tags.length === 0) {
      el.innerHTML = '<span class="empty">No active subscriptions</span>';
    } else {
      el.innerHTML = data.tags.map(t =>
        '<span class="tag">' + t + ' <button class="btn-danger" onclick="removeSubscription(\'' + t + '\')">x</button></span>'
      ).join('');
    }
  } catch (e) { /* ignore */ }
}

async function addSubscription() {
  const input = document.getElementById('sub-input');
  const tag = input.value.trim();
  if (!tag) return;
  await fetch(API + '/api/subscriptions', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({tag})
  });
  input.value = '';
  refreshSubscriptions();
}

async function removeSubscription(tag) {
  await fetch(API + '/api/subscriptions', {
    method: 'DELETE',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({tag})
  });
  refreshSubscriptions();
}

document.getElementById('sub-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addSubscription();
});

// Initial load
refreshStatus();
refreshConfig();
refreshConnections();
refreshTasks();
refreshSubscriptions();

// Auto-refresh every 5 seconds
setInterval(() => {
  refreshStatus();
  refreshConnections();
  refreshTasks();
}, 5000);
</script>
</body>
</html>
