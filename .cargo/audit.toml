[advisories]
ignore = [
    # rumqttc 0.25.1 transitively pins rustls-webpki 0.102.8 (CRL matching bug,
    # fix in >=0.103.10). MQTT TLS in tc-otel does not enable client-cert
    # revocation with UnknownStatusPolicy::Allow, so the bug is not exploitable.
    # Remove when rumqttc upstream upgrades to rustls 0.23 / webpki 0.103.
    "RUSTSEC-2026-0049",
    # rustls-pemfile unmaintained, transitive via rumqttc TLS feature.
    "RUSTSEC-2025-0134",
    # rustls-webpki 0.102.8 name-constraint validation (URI + wildcard).
    # Only reachable over TLS; MQTT client uses plaintext. Fix in 0.103.12+;
    # remove once rumqttc upgrades.
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
]
