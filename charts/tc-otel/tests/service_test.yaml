suite: service
templates:
  - templates/service.yaml
tests:
  - it: should render a Service
    asserts:
      - isKind:
          of: Service

  - it: should be ClusterIP by default
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose AMS port
    asserts:
      - contains:
          path: spec.ports
          content:
            port: 48898
            targetPort: ams
            protocol: TCP
            name: ams

  - it: should expose gRPC port
    asserts:
      - contains:
          path: spec.ports
          content:
            port: 4317
            targetPort: grpc
            protocol: TCP
            name: grpc

  - it: should expose HTTP port
    asserts:
      - contains:
          path: spec.ports
          content:
            port: 4318
            targetPort: http
            protocol: TCP
            name: http

  - it: should allow changing service type to LoadBalancer
    set:
      service.type: LoadBalancer
    asserts:
      - equal:
          path: spec.type
          value: LoadBalancer

  - it: should select pods using standard labels
    asserts:
      - isNotEmpty:
          path: spec.selector
