name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} --draft --generate-notes --title "Release ${{ github.ref_name }}"

  build-binaries:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: tc-otel
            asset_name: tc-otel-linux-amd64

          - name: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: tc-otel
            asset_name: tc-otel-linux-arm64
            cross: true

          - name: windows-amd64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: tc-otel.exe
            asset_name: tc-otel-windows-amd64.exe

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools (arm64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release -p tc-otel-service --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} tc-otel${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a ${{ matrix.asset_name }}.zip tc-otel.exe
          else
            tar czf ${{ matrix.asset_name }}.tar.gz tc-otel
          fi

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            gh release upload ${{ github.ref_name }} ${{ matrix.asset_name }}.zip --clobber
          else
            gh release upload ${{ github.ref_name }} ${{ matrix.asset_name }}.tar.gz --clobber
          fi

      - name: Upload artifact for deb job
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.name }}
          path: tc-otel${{ matrix.os == 'windows-latest' && '.exe' || '' }}

  build-deb:
    name: Build .deb (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [create-release, build-binaries]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            binary_artifact: binary-linux-amd64
            binary_name: tc-otel
          - arch: arm64
            binary_artifact: binary-linux-arm64
            binary_name: tc-otel
    steps:
      - uses: actions/checkout@v6

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.binary_artifact }}
          path: ./binary

      - name: Build .deb package
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          PKG_DIR="tc-otel_${VERSION}_${{ matrix.arch }}"

          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/usr/bin"
          mkdir -p "${PKG_DIR}/etc/tc-otel"
          mkdir -p "${PKG_DIR}/lib/systemd/system"

          cat > "${PKG_DIR}/DEBIAN/control" << EOF
          Package: tc-otel
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: ${{ matrix.arch }}
          Maintainer: Pirmin Bleiker <tc-otel@bleiker.li>
          Description: tc-otel - OpenTelemetry for TwinCAT 3 PLCs
           Receives telemetry from TwinCAT PLCs via AMS/TCP and exports
           via OpenTelemetry (OTLP) to any compatible backend.
          Homepage: https://github.com/pirminbleiker/tc-otel
          EOF

          cat > "${PKG_DIR}/lib/systemd/system/tc-otel.service" << EOF
          [Unit]
          Description=tc-otel - TwinCAT OpenTelemetry Service
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          ExecStart=/usr/bin/tc-otel --config /etc/tc-otel/config.json
          Restart=on-failure
          RestartSec=5
          Environment=RUST_LOG=tc_otel_service=info

          [Install]
          WantedBy=multi-user.target
          EOF

          cp config.example.json "${PKG_DIR}/etc/tc-otel/config.json"

          cat > "${PKG_DIR}/DEBIAN/postinst" << 'POSTINST'
          #!/bin/sh
          set -e
          systemctl daemon-reload
          echo "tc-otel installed. Edit /etc/tc-otel/config.json, then:"
          echo "  sudo systemctl enable --now tc-otel"
          POSTINST
          chmod 755 "${PKG_DIR}/DEBIAN/postinst"

          cp binary/${{ matrix.binary_name }} "${PKG_DIR}/usr/bin/tc-otel"
          chmod 755 "${PKG_DIR}/usr/bin/tc-otel"

          dpkg-deb --build "${PKG_DIR}"

      - name: Upload .deb to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} *.deb --clobber

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-deb, build-docker]
    if: always() && needs.build-binaries.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --draft=false
