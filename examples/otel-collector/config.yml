receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 100

exporters:
  debug:
    verbosity: detailed
  otlphttp/victoria-traces:
    traces_endpoint: http://victoria-traces:10428/insert/opentelemetry/v1/traces
    tls:
      insecure: true
  otlphttp/victoria-logs:
    logs_endpoint: http://victoria-logs:9428/insert/opentelemetry/v1/logs
    tls:
      insecure: true
  prometheusremotewrite/victoria-metrics:
    endpoint: http://victoria-metrics:8428/api/v1/write
    tls:
      insecure: true

# Connectors replace Tempo's built-in metrics-generator: spanmetrics produces
# RED (calls_total, duration_milliseconds) series, servicegraph produces the
# traces_service_graph_* series that Grafana's service map panel needs.
connectors:
  spanmetrics:
    namespace: traces.spanmetrics
    histogram:
      explicit:
        buckets: [5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2s, 5s, 10s]
  servicegraph:
    latency_histogram_buckets: [5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2s, 5s, 10s]
    store:
      ttl: 2s
      max_items: 1000

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/victoria-logs]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/victoria-traces, spanmetrics, servicegraph, debug]
    metrics:
      receivers: [otlp, spanmetrics, servicegraph]
      processors: [batch]
      exporters: [prometheusremotewrite/victoria-metrics]
