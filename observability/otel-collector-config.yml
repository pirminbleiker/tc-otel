receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 100

exporters:
  # Victoria Metrics accepts Prometheus remote-write on /api/v1/write.
  prometheusremotewrite:
    endpoint: http://victoria-metrics:8428/api/v1/write
    tls:
      insecure: true
  # Keep the file sink for debugging.
  file:
    path: /var/log/otlp.jsonl
    rotation:
      max_megabytes: 10
      max_backups: 3

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [file]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheusremotewrite, file]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [file]
