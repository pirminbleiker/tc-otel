receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 100

exporters:
  # Victoria Metrics accepts Prometheus remote-write on /api/v1/write.
  prometheusremotewrite:
    endpoint: http://victoria-metrics:8428/api/v1/write
    tls:
      insecure: true
  # VictoriaLogs receives logs via OTLP. task_cycle_counter and other
  # per-task attributes become indexed fields so Grafana can correlate
  # an exceed (metric, by cycle_count) with the log entry produced on
  # the same task cycle using LogsQL.
  otlphttp/victorialogs:
    endpoint: http://victoria-logs:9428/insert/opentelemetry
    tls:
      insecure: true
  # Tempo receives traces via OTLP HTTP.
  otlphttp/tempo:
    endpoint: http://tempo:4318
    tls:
      insecure: true
  # Keep the file sink for debugging.
  file:
    path: /var/log/otlp.jsonl
    rotation:
      max_megabytes: 10
      max_backups: 3

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/victorialogs, file]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheusremotewrite, file]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/tempo, file]
