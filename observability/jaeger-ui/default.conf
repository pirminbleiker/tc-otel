server {
    listen 80 default_server;
    server_name _;

    # API proxy — Jaeger UI calls /api/services, /api/traces, /api/operations,
    # etc. VictoriaTraces exposes the same surface at /select/jaeger/api/*.
    location /api/ {
        proxy_pass http://victoria-traces:10428/select/jaeger/api/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }

    # Static UI assets (SPA — fall through to index.html for client-side routes).
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
