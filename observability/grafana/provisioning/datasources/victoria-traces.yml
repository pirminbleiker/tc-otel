apiVersion: 1

datasources:
  - name: VictoriaTraces
    uid: victoria-traces
    type: jaeger
    access: proxy
    # VictoriaTraces exposes a Jaeger-compatible query API under /select/jaeger.
    # Grafana's Jaeger datasource appends /api/services, /api/traces/<id>, etc.
    url: http://victoria-traces:10428/select/jaeger
    editable: true
    jsonData:
      tracesToLogsV2:
        datasourceUid: victoria-logs
        spanStartTimeShift: '-1s'
        spanEndTimeShift: '1s'
        tags: ['task.cycle']
        filterByTraceID: true
        filterBySpanID: false
      tracesToMetrics:
        datasourceUid: victoriametrics
      nodeGraph:
        enabled: true
