services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    ports:
      - "1883:1883"
    command: mosquitto -c /mosquitto-no-auth.conf
    networks:
      - tc-otel-obs
    restart: unless-stopped

  victoria-metrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: victoria-metrics
    ports:
      - "8428:8428"
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=30d"
    volumes:
      - vm-data:/storage
    networks:
      - tc-otel-obs
    restart: unless-stopped

  victoria-logs:
    image: victoriametrics/victoria-logs:latest
    container_name: victoria-logs
    ports:
      - "9428:9428"
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=30d"
    volumes:
      - vl-data:/storage
    networks:
      - tc-otel-obs
    restart: unless-stopped

  victoria-traces:
    image: victoriametrics/victoria-traces:latest
    container_name: victoria-traces
    ports:
      - "10428:10428"
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=30d"
    volumes:
      - vt-data:/storage
    networks:
      - tc-otel-obs
    restart: unless-stopped

  jaeger-ui:
    build:
      context: ./observability/jaeger-ui
    image: tc-otel-jaeger-ui:local
    container_name: jaeger-ui
    ports:
      - "16686:80"
    networks:
      - tc-otel-obs
    depends_on:
      - victoria-traces
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
    volumes:
      - ./examples/otel-collector/config.yml:/etc/otel-collector-config.yml:ro
      - otel-output:/var/log
    networks:
      - tc-otel-obs
    depends_on:
      - victoria-metrics
      - victoria-traces
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/tc-otel-diagnostics.json
      - GF_INSTALL_PLUGINS=victoriametrics-logs-datasource
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - tc-otel-obs
    depends_on:
      - victoria-metrics
      - victoria-logs
    restart: unless-stopped

  tc-otel:
    image: tc-otel:local
    container_name: tc-otel
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=tc_otel=info,tc_otel_ads=info
    volumes:
      - ./tc-otel-config:/etc/tc-otel
    networks:
      tc-otel-obs:
        ipv4_address: 10.21.0.10
    depends_on:
      - mosquitto
      - otel-collector
    restart: unless-stopped

  tc31-xar-base:
    image: ghcr.io/pirminbleiker/tc31-xar-base:latest
    container_name: tc31-xar-base
    hostname: tc31-xar-base
    privileged: true
    ports:
      - "48898:48898/tcp"
      - "48899:48899/udp"
    volumes:
      - ./examples/twincat/StaticRoutes.xml:/etc/TwinCAT/3.1/Target/StaticRoutes.xml:ro
      - tc31-boot:/etc/TwinCAT/3.1/Boot
      - tc31-license:/etc/TwinCAT/3.1/Target/License
    networks:
      tc-otel-obs:
        ipv4_address: 10.21.0.20
    depends_on:
      - tc-otel
      - mosquitto
    restart: unless-stopped

volumes:
  vm-data:
  vl-data:
  vt-data:
  grafana-data:
  otel-output:
  tc31-boot:
  tc31-license:

networks:
  tc-otel-obs:
    driver: bridge
    ipam:
      config:
        - subnet: 10.21.0.0/24
